<div class="ufm-widget" role="region" aria-label="Uploaded Files Manager">
  
  <!-- Main Container with Two Panels -->
  <div class="ufm-container">
    
    <!-- Left Panel: Uploaded Files List -->
    <div class="ufm-files-panel" role="main" aria-label="Uploaded files">
      
      <!-- Header -->
      <div class="ufm-files-header">
        <h2 class="ufm-files-title">Uploaded files</h2>
        <button class="ufm-refresh-btn" type="button" aria-label="Refresh file list" title="Refresh">
          <span class="ufm-refresh-icon" aria-hidden="true">↻</span>
        </button>
      </div>
      
      <!-- Selection Controls -->
      <div class="ufm-selection-controls">
        <button class="ufm-select-all-btn" type="button" aria-label="Select all files">
          Select all
        </button>
        <span class="ufm-separator">/</span>
        <button class="ufm-unselect-all-btn" type="button" aria-label="Unselect all files">
          Unselect all
        </button>
        <span class="ufm-file-count" role="status" aria-live="polite">25 files</span>
      </div>
      
      <!-- Files List Container -->
      <div class="ufm-files-list" role="list" aria-label="Files and folders">
        <!-- File/Folder items will be injected here by JavaScript -->
      </div>
      
    </div>
    
    <!-- Right Panel: Details -->
    <aside class="ufm-details-panel" role="complementary" aria-label="File details">
      
      <!-- Header with Save Button -->
      <div class="ufm-details-header">
        <h2 class="ufm-details-title">Details</h2>
        <button class="ufm-save-btn" type="button" aria-label="Save changes">
          <span class="ufm-save-icon" aria-hidden="true"></span>
          Save
        </button>
      </div>
      
      <!-- Selection Status -->
      <div class="ufm-selection-status" role="status" aria-live="polite">
        <span class="ufm-selection-text">No files selected</span>
      </div>
      
      <!-- Details Form -->
      <div class="ufm-details-form">
        
        <!-- Dynamic Updateable Fields Container -->
        <div class="ufm-updateable-fields">
          <!-- Updateable fields will be dynamically generated here by JavaScript -->
        </div>
        
      </div>
      
      <!-- Empty State -->
      <div class="ufm-details-empty">
        <div class="ufm-empty-icon" aria-hidden="true">📄</div>
        <p class="ufm-empty-text">Select files to view and edit their details</p>
      </div>
      
    </aside>
    
  </div>
  
  <!-- Delete Confirmation Modal -->
  <div class="ufm-modal" id="ufm-delete-modal" role="dialog" aria-labelledby="ufm-modal-title" aria-modal="true" style="display: none;">
    <div class="ufm-modal-overlay"></div>
    <div class="ufm-modal-content">
      <div class="ufm-modal-header">
        <h3 class="ufm-modal-title" id="ufm-modal-title">Confirm Deletion</h3>
        <button class="ufm-modal-close" type="button" aria-label="Close dialog">×</button>
      </div>
      <div class="ufm-modal-body">
        <div class="ufm-modal-icon">⚠️</div>
        <p class="ufm-modal-message"></p>
      </div>
      <div class="ufm-modal-footer">
        <button class="ufm-modal-btn ufm-modal-cancel" type="button">Cancel</button>
        <button class="ufm-modal-btn ufm-modal-confirm" type="button">Delete</button>
      </div>
    </div>
  </div>
  
</div>
