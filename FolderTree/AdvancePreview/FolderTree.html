<style>
.folder-tree-widget {
    display: inline-block;
    max-width: 450px;
}

.ufm-widget {
    font-family: 'IBM Plex Sans', 'Helvetica Neue', Arial, sans-serif;
    background-color: #ffffff;
    border: 1px solid #e0e0e0;
    border-radius: 4px;
    display: inline-block;
    min-width: 280px;
}

.ufm-container {
    display: block;
}

.ufm-files-panel {
    width: 100%;
    padding: 16px;
}

.ufm-details-panel {
    display: none;
}

.ufm-files-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
}

.ufm-files-title {
    font-size: 16px;
    font-weight: 600;
    color: #161616;
}

.ufm-refresh-btn {
    background: transparent;
    border: none;
    cursor: pointer;
    padding: 8px;
    color: #0f62fe;
}

.ufm-selection-controls {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
    font-size: 14px;
}

.ufm-select-all-btn,
.ufm-unselect-all-btn {
    background: transparent;
    border: none;
    color: #0f62fe;
    cursor: pointer;
    padding: 4px 8px;
}

.ufm-file-count {
    margin-left: auto;
    color: #525252;
}

.ufm-files-list {
    overflow-y: auto;
    max-height: 300px;
    width: 100%;
}

.ufm-file-item {
    padding: 8px;
    border: 1px solid #e0e0e0;
    margin-bottom: 4px;
    border-radius: 4px;
    cursor: pointer;
}

.ufm-file-item:hover {
    background-color: #f4f4f4;
}

</style>

<div class="SPARKPanel panel folder-tree-widget">
    <div class="ufm-widget" role="region" aria-label="Folder Tree Manager">
        <div class="ufm-container">
            <!-- Left Panel: Files List -->
            <div class="ufm-files-panel" role="main" aria-label="Files and folders">
                <div class="ufm-files-header">
                    <h2 class="ufm-files-title">Uploaded files</h2>
                    <button class="ufm-refresh-btn" type="button" aria-label="Refresh file list" title="Refresh">
                        <span class="ufm-refresh-icon" aria-hidden="true">↻</span>
                    </button>
                </div>
                
                <div class="ufm-selection-controls">
                    <button class="ufm-select-all-btn" type="button" aria-label="Select all files">
                        Select all
                    </button>
                    <span class="ufm-separator">/</span>
                    <button class="ufm-unselect-all-btn" type="button" aria-label="Unselect all files">
                        Unselect all
                    </button>
                    <span class="ufm-file-count" role="status" aria-live="polite">Sample files</span>
                </div>
                
                <div class="ufm-files-list" role="list" aria-label="Files and folders">
                    <!-- Sample folder structure for preview -->
                    <div class="ufm-file-item" role="listitem">
                        <input type="checkbox" aria-label="Select folder">
                        <span>📁 Documents</span>
                    </div>
                    <div class="ufm-file-item" role="listitem" style="margin-left: 20px;">
                        <input type="checkbox" aria-label="Select file">
                        <span>📄 Report.pdf</span>
                    </div>
                    <div class="ufm-file-item" role="listitem" style="margin-left: 20px;">
                        <input type="checkbox" aria-label="Select file">
                        <span>📄 Summary.docx</span>
                    </div>
                    <div class="ufm-file-item" role="listitem">
                        <input type="checkbox" aria-label="Select folder">
                        <span>📁 Images</span>
                    </div>
                    <div class="ufm-file-item" role="listitem" style="margin-left: 20px;">
                        <input type="checkbox" aria-label="Select file">
                        <span>🖼️ Photo1.jpg</span>
                    </div>
                </div>
            </div>
            
        </div>
    </div>
</div>
