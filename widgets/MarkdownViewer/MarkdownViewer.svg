<svg width="120" height="120" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="120" height="120" fill="#ffffff"/>
  
  <!-- Markdown document -->
  <g transform="translate(20, 15)">
    
    <!-- Document container -->
    <rect x="0" y="0" width="80" height="90" rx="4" fill="#ffffff" stroke="#8d8d8d" stroke-width="1.5"/>
    
    <!-- Markdown icon (M with down arrow) -->
    <g transform="translate(5, 8)">
      <text x="0" y="12" font-family="IBM Plex Mono, monospace" font-size="14" fill="#0f62fe" font-weight="700">M↓</text>
    </g>
    
    <!-- Rendered content preview -->
    <g transform="translate(8, 25)">
      <!-- Header -->
      <text x="0" y="0" font-family="IBM Plex Sans, Arial, sans-serif" font-size="10" fill="#161616" font-weight="600"># Heading</text>
      
      <!-- Paragraph -->
      <line x1="0" y1="8" x2="60" y2="8" stroke="#525252" stroke-width="0.5"/>
      <line x1="0" y1="11" x2="55" y2="11" stroke="#525252" stroke-width="0.5"/>
      <line x1="0" y1="14" x2="50" y2="14" stroke="#525252" stroke-width="0.5"/>
      
      <!-- Bold text -->
      <rect x="0" y="20" width="25" height="6" fill="#e0e0e0"/>
      <text x="2" y="25" font-family="IBM Plex Sans, Arial, sans-serif" font-size="5" fill="#161616" font-weight="700">**bold text**</text>
      
      <!-- List -->
      <circle cx="2" cy="33" r="1.5" fill="#0f62fe"/>
      <line x1="6" y1="33" x2="40" y2="33" stroke="#525252" stroke-width="0.5"/>
      <circle cx="2" cy="38" r="1.5" fill="#0f62fe"/>
      <line x1="6" y1="38" x2="35" y2="38" stroke="#525252" stroke-width="0.5"/>
      
      <!-- Code block -->
      <rect x="0" y="44" width="64" height="16" rx="2" fill="#f4f4f4" stroke="#8d8d8d" stroke-width="0.5"/>
      <text x="3" y="51" font-family="IBM Plex Mono, monospace" font-size="5" fill="#da1e28">const</text>
      <text x="15" y="51" font-family="IBM Plex Mono, monospace" font-size="5" fill="#161616">x = 1;</text>
      <text x="3" y="56" font-family="IBM Plex Mono, monospace" font-size="5" fill="#0f62fe">console</text>
      <text x="20" y="56" font-family="IBM Plex Mono, monospace" font-size="5" fill="#161616">.log(x);</text>
    </g>
    
  </g>
</svg>

