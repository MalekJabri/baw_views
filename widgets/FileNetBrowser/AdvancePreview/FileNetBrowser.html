<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FileNetBrowser Widget - Preview</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'IBM Plex Sans', 'Helvetica Neue', Arial, sans-serif;
      background-color: #f4f4f4;
      padding: 20px;
    }

    .preview-container {
      max-width: 1400px;
      margin: 0 auto;
      background-color: #ffffff;
      padding: 24px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .preview-header {
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 2px solid #e0e0e0;
    }

    .preview-header h1 {
      font-size: 24px;
      font-weight: 400;
      color: #161616;
      margin-bottom: 8px;
    }

    .preview-header p {
      font-size: 14px;
      color: #6f6f6f;
    }
  </style>
</head>
<body>
  <div class="preview-container">
    <div class="preview-header">
      <h1>FileNetBrowser Widget - Preview</h1>
      <p>Preview of the FileNetBrowser widget with mock FileNet data</p>
    </div>

    <!-- Widget Container -->
    <div id="fnbrowser-widget-container"></div>
  </div>

  <script src="FileNetBrowser.js"></script>
</body>
</html>
