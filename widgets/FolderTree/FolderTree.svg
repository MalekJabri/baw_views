<svg width="120" height="120" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="120" height="120" fill="#ffffff"/>
  
  <!-- Two-panel layout -->
  <g transform="translate(10, 15)">
    
    <!-- Left panel - File tree -->
    <rect x="0" y="0" width="50" height="90" rx="4" fill="#f4f4f4" stroke="#8d8d8d" stroke-width="1"/>
    
    <!-- Tree structure -->
    <g transform="translate(5, 8)">
      <!-- Folder with checkbox -->
      <rect x="0" y="0" width="8" height="8" rx="1" fill="#ffffff" stroke="#0f62fe" stroke-width="1"/>
      <path d="M 2 4 L 3.5 5.5 L 6 2.5" stroke="#0f62fe" stroke-width="1" fill="none" stroke-linecap="round"/>
      <path d="M 12 2 L 12 8 L 20 8 L 20 2 L 14 2 L 14 0 L 18 0 L 20 2" fill="#0f62fe" stroke="#0f62fe" stroke-width="0.5"/>
      <text x="23" y="7" font-family="IBM Plex Sans, Arial, sans-serif" font-size="7" fill="#161616">Folder 1</text>
      
      <!-- File 1 -->
      <rect x="2" y="12" width="8" height="8" rx="1" fill="#ffffff" stroke="#8d8d8d" stroke-width="1"/>
      <rect x="14" y="14" width="5" height="6" fill="#ffffff" stroke="#525252" stroke-width="0.5"/>
      <line x1="15" y1="16" x2="18" y2="16" stroke="#525252" stroke-width="0.3"/>
      <line x1="15" y1="18" x2="18" y2="18" stroke="#525252" stroke-width="0.3"/>
      <text x="23" y="19" font-family="IBM Plex Sans, Arial, sans-serif" font-size="6" fill="#525252">file1.pdf</text>
      
      <!-- File 2 -->
      <rect x="2" y="24" width="8" height="8" rx="1" fill="#0f62fe" stroke="#0f62fe" stroke-width="1"/>
      <path d="M 4 28 L 5.5 29.5 L 8 26.5" stroke="#ffffff" stroke-width="1" fill="none" stroke-linecap="round"/>
      <rect x="14" y="26" width="5" height="6" fill="#ffffff" stroke="#525252" stroke-width="0.5"/>
      <line x1="15" y1="28" x2="18" y2="28" stroke="#525252" stroke-width="0.3"/>
      <line x1="15" y1="30" x2="18" y2="30" stroke="#525252" stroke-width="0.3"/>
      <text x="23" y="31" font-family="IBM Plex Sans, Arial, sans-serif" font-size="6" fill="#525252">file2.pdf</text>
    </g>
    
    <!-- Right panel - Details -->
    <rect x="55" y="0" width="45" height="90" rx="4" fill="#ffffff" stroke="#8d8d8d" stroke-width="1"/>
    
    <!-- Details content -->
    <g transform="translate(60, 8)">
      <text x="0" y="5" font-family="IBM Plex Sans, Arial, sans-serif" font-size="8" fill="#161616" font-weight="600">File Details</text>
      
      <!-- Metadata fields -->
      <text x="0" y="18" font-family="IBM Plex Sans, Arial, sans-serif" font-size="6" fill="#525252">Language:</text>
      <rect x="0" y="20" width="35" height="10" rx="2" fill="#f4f4f4" stroke="#8d8d8d" stroke-width="0.5"/>
      <text x="3" y="27" font-family="IBM Plex Sans, Arial, sans-serif" font-size="6" fill="#161616">English</text>
      
      <text x="0" y="38" font-family="IBM Plex Sans, Arial, sans-serif" font-size="6" fill="#525252">Doc Type:</text>
      <rect x="0" y="40" width="35" height="10" rx="2" fill="#f4f4f4" stroke="#8d8d8d" stroke-width="0.5"/>
      <text x="3" y="47" font-family="IBM Plex Sans, Arial, sans-serif" font-size="6" fill="#161616">Judgment</text>
      
      <!-- Action button -->
      <rect x="0" y="58" width="35" height="12" rx="2" fill="#0f62fe"/>
      <text x="17.5" y="66" font-family="IBM Plex Sans, Arial, sans-serif" font-size="7" fill="#ffffff" text-anchor="middle">Update</text>
    </g>
    
  </g>
</svg>

<!-- Made with Bob -->
