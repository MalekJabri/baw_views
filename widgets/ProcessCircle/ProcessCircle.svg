<svg width="120" height="120" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="120" height="120" fill="#ffffff"/>
  
  <!-- Circular progress indicator -->
  <g transform="translate(60, 60)">
    
    <!-- Background circle -->
    <circle cx="0" cy="0" r="35" fill="none" stroke="#e0e0e0" stroke-width="8"/>
    
    <!-- Progress arc (65% - Orange/Warning state) -->
    <circle cx="0" cy="0" r="35" fill="none" stroke="#ff832b" stroke-width="8" 
            stroke-dasharray="143 220" 
            stroke-dashoffset="55"
            transform="rotate(-90)"
            stroke-linecap="round">
      <animate attributeName="stroke-dasharray" 
               from="0 220" 
               to="143 220" 
               dur="3s" 
               fill="freeze"/>
    </circle>
    
    <!-- Center value -->
    <text x="0" y="8" font-family="IBM Plex Sans, Arial, sans-serif" font-size="24" font-weight="600" fill="#161616" text-anchor="middle">65%</text>
    
  </g>
  
  <!-- Color state indicators -->
  <g transform="translate(30, 105)">
    <circle cx="5" cy="5" r="4" fill="#24a148"/>
    <circle cx="30" cy="5" r="4" fill="#ff832b"/>
    <circle cx="55" cy="5" r="4" fill="#da1e28"/>
  </g>
</svg>

