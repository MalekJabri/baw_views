<svg width="120" height="120" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="120" height="120" fill="#ffffff"/>
  
  <!-- Drop zone -->
  <g transform="translate(15, 20)">
    
    <!-- Dashed border drop zone -->
    <rect x="0" y="0" width="90" height="60" rx="8" fill="#f4f4f4" stroke="#0f62fe" stroke-width="2" stroke-dasharray="5,5"/>
    
    <!-- Upload icon -->
    <g transform="translate(45, 15)">
      <!-- Cloud -->
      <path d="M -8 10 Q -8 5 -3 5 Q -3 0 3 0 Q 8 0 8 5 Q 13 5 13 10 Q 13 15 8 15 L -8 15 Q -13 15 -13 10 Q -13 5 -8 5" 
            fill="#0f62fe" opacity="0.3"/>
      <!-- Arrow up -->
      <path d="M 0 20 L 0 8 M -4 12 L 0 8 L 4 12" stroke="#0f62fe" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    
    <!-- Text -->
    <text x="45" y="45" font-family="IBM Plex Sans, Arial, sans-serif" font-size="10" fill="#0f62fe" text-anchor="middle" font-weight="500">Drop files here</text>
    <text x="45" y="55" font-family="IBM Plex Sans, Arial, sans-serif" font-size="8" fill="#525252" text-anchor="middle">or click to browse</text>
    
  </g>
  
  <!-- Progress indicator -->
  <g transform="translate(15, 85)">
    <rect x="0" y="0" width="90" height="4" rx="2" fill="#e0e0e0"/>
    <rect x="0" y="0" width="60" height="4" rx="2" fill="#24a148"/>
    <text x="45" y="12" font-family="IBM Plex Sans, Arial, sans-serif" font-size="8" fill="#525252" text-anchor="middle">Uploading: 2 of 3 files</text>
  </g>
</svg>

