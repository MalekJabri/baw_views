<div class="multiselect-container" role="region" aria-label="Multi-select dropdown">
  <div class="multiselect-wrapper">
    <div class="multiselect-input-wrapper" role="combobox" aria-expanded="false" aria-haspopup="listbox">
      <div class="multiselect-selected-items">
        <span class="multiselect-placeholder">Select items...</span>
      </div>
      <button type="button" class="multiselect-toggle" aria-label="Toggle dropdown">
        <svg class="multiselect-icon" width="20" height="20" viewBox="0 0 16 16" fill="currentColor">
          <path d="M8 11L3 6 3.7 5.3 8 9.6 12.3 5.3 13 6z"/>
        </svg>
      </button>
    </div>
    <div class="multiselect-dropdown" role="listbox" aria-multiselectable="true">
      <div class="multiselect-search-wrapper">
        <input type="text" class="multiselect-search" placeholder="Search..." aria-label="Search items">
        <svg class="multiselect-search-icon" width="20" height="20" viewBox="0 0 16 16" fill="currentColor">
          <path d="M15 14.3L10.7 10c.9-1.2 1.5-2.7 1.5-4.2 0-3.7-3-6.8-6.7-6.8S-1.2 2.1-1.2 5.8s3 6.8 6.7 6.8c1.8 0 3.4-.7 4.6-1.8L14.3 15 15 14.3zM5.5 11.3c-3 0-5.5-2.5-5.5-5.5S2.5.3 5.5.3 11 2.8 11 5.8s-2.5 5.5-5.5 5.5z"/>
        </svg>
      </div>
      <div class="multiselect-options">
        <!-- Options will be dynamically generated -->
      </div>
      <div class="multiselect-actions">
        <button type="button" class="multiselect-action-btn multiselect-select-all">Select All</button>
        <button type="button" class="multiselect-action-btn multiselect-clear-all">Clear All</button>
      </div>
    </div>
  </div>
  <div class="multiselect-helper-text"></div>
</div>
