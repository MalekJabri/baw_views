<svg width="120" height="120" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="120" height="120" fill="#ffffff"/>
  
  <!-- Main container with padding -->
  <g transform="translate(15, 20)">
    
    <!-- Progress Bar Track -->
    <rect x="0" y="20" width="90" height="10" rx="5" fill="#e0e0e0"/>
    
    <!-- Progress Bar Fill (75% - Green state) -->
    <rect x="0" y="20" width="67.5" height="10" rx="5" fill="#24a148">
      <!-- Shimmer effect -->
      <animate attributeName="opacity" values="1;0.8;1" dur="2s" repeatCount="indefinite"/>
    </rect>
    
    <!-- Percentage Display -->
    <text x="45" y="55" font-family="IBM Plex Sans, Arial, sans-serif" font-size="28" font-weight="600" fill="#24a148" text-anchor="middle">75%</text>
    
    <!-- Status Message -->
    <rect x="10" y="65" width="70" height="20" rx="4" fill="#defbe6"/>
    <text x="45" y="78" font-family="IBM Plex Sans, Arial, sans-serif" font-size="10" fill="#0e6027" text-anchor="middle">In progress</text>
    
  </g>
</svg>

