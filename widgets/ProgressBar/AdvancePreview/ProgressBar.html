<style>
.progressbar-heading {
    padding-bottom: 4px;
}

.progressbar_maincontentbox {
	width: 100%;
	min-height: 120px;
	padding: 1rem;
	font-family: 'IBM Plex Sans', 'Helvetica Neue', Arial, sans-serif;
}

.progressbar_maincontentbox .DesignContentBox .progressbar-container {
	display: flex;
	flex-direction: column;
	gap: 1rem;
	width: 100%;
}

.progressbar_maincontentbox .DesignContentBox .progressbar-track {
	width: 100%;
	height: 8px;
	background-color: #e0e0e0;
	border-radius: 4px;
	overflow: hidden;
	position: relative;
	box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.1);
}

.progressbar_maincontentbox .DesignContentBox .progressbar-fill {
	height: 100%;
	background-color: #24a148;
	border-radius: 4px;
	transition: width 0.5s ease-in-out, background-color 0.3s ease;
	position: relative;
	overflow: hidden;
}

.progressbar_maincontentbox .DesignContentBox .progressbar-fill::after {
	content: '';
	position: absolute;
	top: 0;
	left: -100%;
	width: 100%;
	height: 100%;
	background: linear-gradient(
		90deg,
		transparent,
		rgba(255, 255, 255, 0.3),
		transparent
	);
	animation: shimmer 2s infinite;
}

@keyframes shimmer {
	0% {
		left: -100%;
	}
	100% {
		left: 100%;
	}
}

.progressbar_maincontentbox .DesignContentBox .progressbar-percentage {
	display: flex;
	justify-content: center;
	align-items: center;
}

.progressbar_maincontentbox .DesignContentBox .percentage-value {
	font-size: 2rem;
	font-weight: 600;
	color: #24a148;
}

.progressbar_maincontentbox .DesignContentBox .progressbar-status {
	display: flex;
	justify-content: center;
	align-items: center;
}

.progressbar_maincontentbox .DesignContentBox .status-message {
	font-size: 0.875rem;
	font-weight: 400;
	color: #0e6027;
	text-align: center;
	padding: 0.5rem 1rem;
	border-radius: 4px;
	background-color: #defbe6;
}

@keyframes pulse {
	0%, 100% {
		opacity: 1;
	}
	50% {
		opacity: 0.7;
	}
}

</style>
<div class="SPARKPanel panel">
	<div class="progressbar-heading">
		<span class="progressbar-title">Progress Bar Widget Preview</span>		
	</div>
	<div class="progressbar-body">
		<!-- Preview content will be generated by ProgressBarSnippet.js -->
	</div>
</div>
