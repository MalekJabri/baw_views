<div class="progressbar_maincontentbox" role="region" aria-label="Progress indicator">
  <div class="progressbar-container">
    <!-- Progress bar track -->
    <div class="progressbar-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
      <div class="progressbar-fill"></div>
    </div>
    
    <!-- Percentage display -->
    <div class="progressbar-percentage" aria-live="polite">
      <span class="percentage-value">0%</span>
    </div>
    
    <!-- Status message -->
    <div class="progressbar-status" aria-live="polite">
      <span class="status-message">Not started</span>
    </div>
  </div>
</div>
